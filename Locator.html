<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locator Practice</title>

    <style>
        body{
            font-family: Arial;
            margin:40px;
        }

        .input-box{
            margin:10px 0;
        }

        .btn{
            background:royalblue;
            color:white;
            padding:10px 20px;
            border:none;
            cursor:pointer;
        }

        .link{
            color:blue;
            display:block;
            margin-top:20px;
        }
    </style>

</head>

<body>

<h1 id="title">Selenium Locator Practice</h1>

<input
id="username"
name="user"
class="input-box"
placeholder="Username">

<input
id="password"
name="pass"
class="input-box"
type="password"
placeholder="Password">

<button
id="loginBtn"
class="btn">
Login
</button>

<button
class="btn">
Register
</button>

<a
href="#"
class="link">
Forgot Password
</a>

<a
href="#"
class="link">
Create New Account
</a>

</body>
</html>
