<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Dropdown Playground</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.container{

width:500px;
margin:auto;
background:white;
padding:30px;
box-shadow:0 0 10px gray;
border-radius:10px;

}

select{

width:100%;
padding:10px;
margin:15px 0;

}

button{

width:100%;
padding:12px;

}

#result{

margin-top:20px;
font-weight:bold;
color:green;

}

</style>

</head>

<body>

<div class="container">

<h1>Country Selection</h1>

<select id="country">

<option value="">-- Select Country --</option>

<option value="india">

India

</option>

<option value="usa">

United States

</option>

<option value="uk">

United Kingdom

</option>

<option value="canada">

Canada

</option>

<option value="australia">

Australia

</option>

</select>

<button id="submitBtn">

Submit

</button>

<p id="result"></p>

</div>

<script>

document
.getElementById("submitBtn")
.onclick=()=>{

const dropdown=
document.getElementById("country");

const text=

dropdown.options[
dropdown.selectedIndex
].text;

document
.getElementById("result")
.innerHTML=

"Selected Country : " + text;

}

</script>

</body>

</html>
