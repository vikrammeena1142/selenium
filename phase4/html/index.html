<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>HTML Playground</title>

<style>

body{

    font-family:Arial;
    background:#f4f4f4;
    padding:40px;

}

.container{

    width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);

}

input,
select{

    width:100%;
    padding:10px;
    margin:10px 0;

}

button{

    padding:12px 25px;

}

</style>

</head>

<body>

<div class="container">

<h1 id="heading">

HTML Playground

</h1>

<img
id="logo"
src="https://dummyimage.com/120x60/1976d2/ffffff&text=Logo"
alt="Company Logo">

<input
id="username"
name="username"
type="text"
placeholder="Enter Username"
value="John Doe">

<input
id="email"
name="email"
type="email"
placeholder="Enter Email">

<input
id="password"
type="password"
placeholder="Enter Password">

<input
id="readonlyBox"
value="Cannot Edit"
readonly>

<br><br>

<label>

<input
id="remember"
type="checkbox"
checked>

Remember Me

</label>

<br><br>

<button
id="loginBtn">

Login

</button>

<button
id="disabledBtn"
disabled>

Disabled Button

</button>

<br><br>

<select id="country">

<option>India</option>

<option selected>

USA

</option>

<option>

Canada

</option>

</select>

<br><br>

<a
id="docs"
href="https://www.selenium.dev">

Official Selenium

</a>

</div>

</body>

</html>
