<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>XPath Playground</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:40px;
}

.container{
width:750px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.card{
padding:20px;
border:1px solid #ddd;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
}

button{
padding:10px 20px;
margin-top:15px;
}

</style>

</head>

<body>

<div id="container" class="container">

<div id="loginCard" class="card">

<h1>

XPath Playground

</h1>

<form id="loginForm">

<div class="form-group">

<label>Username</label>

<input id="user_001"name="username"type="text">

</div>

<div class="form-group">

<label>

Password

</label>

<input
id="pass_001"
name="password"
type="password">

</div>

<button id="loginBtn" class="btn success">Login</button>

<button id="cancelBtn" class="btn cancel">Cancel</button>

</form>

</div>

<div class="card">

<h2>

Courses

</h2>

<ul>

<li>JavaScript</li>
<li>Node.js</li>
<li>Selenium</li>
<li>Playwright</li>

</ul>

</div>

</div>

</body>

</html>
