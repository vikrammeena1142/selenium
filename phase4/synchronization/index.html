<!DOCTYPE html>
<html>

<head>

<title>Synchronization Playground</title>

<style>

body{

font-family:Arial;

padding:40px;

background:#f5f5f5;

}

.container{

width:700px;

margin:auto;

background:white;

padding:30px;

border-radius:10px;

box-shadow:0 0 10px gray;

}

button{

padding:12px 20px;

margin-top:20px;

}

.hidden{

display:none;

}

</style>

</head>

<body>

<div class="container">

<h1>Synchronization Playground</h1>

<p>

Elements will appear after a few seconds.

</p>

<button
id="loadBtn">

Load Login Form

</button>

<div
id="loginForm"
class="hidden">

<br>

<input
id="username"
placeholder="Username">

<br><br>

<input
id="password"
placeholder="Password">

<br><br>

<button
id="loginBtn">

Login

</button>

</div>

</div>

<script>

document
.getElementById("loadBtn")
.addEventListener("click",()=>{

setTimeout(()=>{

document
.getElementById("loginForm")
.classList.remove("hidden");

},3000);

});

</script>

</body>

</html>
