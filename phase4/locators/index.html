<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Locator Playground</title>

<style>

body{
    font-family:Arial;
    background:#f3f5f7;
    margin:40px;
}

.container{

    width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);

}

.logo{

    width:80px;
    display:block;
    margin:auto;

}

h1{

    text-align:center;

}

input{

    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;

}

button{

    padding:12px 25px;
    cursor:pointer;
    margin-right:10px;

}

.primary{

    background:#0d6efd;
    color:white;
}

.secondary{

    background:#198754;
    color:white;
}

.links{

    margin-top:20px;

}

.links a{

    display:block;
    margin-top:10px;

}

</style>

</head>

<body>

<div
id="container"
class="container">

<img
src="https://dummyimage.com/80x80/0d6efd/ffffff&text=S"
id="logo"
class="logo"
alt="Logo">

<h1 id="heading">

Selenium Login Portal

</h1>

<p>

Practice every Selenium Locator here.

</p>

<input
id="username"
name="username"
class="textbox"
placeholder="Enter Username">

<input
id="password"
name="password"
class="textbox"
type="password"
placeholder="Enter Password">

<label>

<input
id="remember"
type="checkbox">

Remember Me

</label>

<br><br>

<button
id="loginBtn"
class="primary btn">

Login

</button>

<button
id="registerBtn"
class="secondary btn">

Register

</button>

<div class="links">

<a
href="#"
id="forgotLink">

Forgot Password

</a>

<a
href="#">

Create New Account

</a>

</div>

<ul id="courses">

<li>JavaScript</li>

<li>Selenium</li>

<li>Playwright</li>

<li>Cypress</li>

</ul>

</div>

</body>

</html>
