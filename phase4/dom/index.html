<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>DOM Playground</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    padding:40px;
}

.container{

    width:700px;
    margin:auto;

}

.card{

    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);

}

.form-group{

    margin-bottom:15px;

}

label{

    display:block;
    margin-bottom:6px;

}

input{

    width:100%;
    padding:10px;

}

button{

    margin-top:20px;
    padding:12px 20px;

}

.footer{

    margin-top:30px;
    text-align:center;
    color:gray;

}

</style>

</head>

<body>

<div
id="container"
class="container">

<div
id="loginCard"
class="card">

<h1>

Login Portal

</h1>

<form
id="loginForm">

<div class="form-group">

<label>

Username

</label>

<input
id="username"
type="text">

</div>

<div class="form-group">

<label>

Password

</label>

<input
id="password"
type="password">

</div>

<button
id="loginBtn">

Login

</button>

</form>

</div>

<div
class="footer">

Copyright 2026

</div>

</div>

</body>

</html>
